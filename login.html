<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Login — YLG Bullion</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Sans+Myanmar:wght@400;700&family=Noto+Sans+Thai:wght@400;700&display=swap" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
	    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard-styles.css">
    <link rel="stylesheet" href="mobile-responsive.css">
    <link rel="stylesheet" href="theme.css">
    <style>
		:root{--bg:#0f1113;--card:#141516;--accent:#FFD700;--muted:#9aa0a6;--input:#1e1e1e}
		*{box-sizing:border-box}
		body{margin:0;font-family:'Noto Sans Myanmar','Noto Sans Thai','Inter',Segoe UI,Arial,system-ui,sans-serif;background:linear-gradient(180deg,#08090a 0%,#111214 100%);color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;padding:20px}
		.card{background:var(--card);max-width:420px;width:100%;padding:28px;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,0.6);border:1px solid rgba(255,215,0,0.03)}
		.brand{display:flex;align-items:center;gap:12px;margin-bottom:8px}
		.logo{width:52px;height:52px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#e6b800);display:flex;align-items:center;justify-content:center;color:#111;font-weight:800;font-size:20px}
		h1{margin:0 0 8px 0;font-size:20px}
		p.lead{margin:0 0 18px 0;color:var(--muted);font-size:13px}

		label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
		input[type=email],input[type=password]{width:100%;padding:12px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:var(--input);color:#fff;font-size:14px}
		.row{display:flex;gap:10px;align-items:center}
		.actions{margin-top:14px}
		button.primary{width:100%;padding:12px;border-radius:10px;border:none;background:var(--accent);color:#111;font-weight:700;cursor:pointer;font-size:15px}
		button.primary[disabled]{opacity:0.7;cursor:default}
		.sub{display:flex;justify-content:space-between;align-items:center;margin-top:10px;color:var(--muted);font-size:13px}
		a.link{color:var(--muted);text-decoration:none}
		.small{font-size:12px;color:var(--muted)}
		.error{margin-top:10px;padding:10px;background:#3a1b1b;color:#ffd3d3;border-radius:8px;display:none}
		.debug{margin-top:10px;padding:10px;background:#0b1220;color:#9fefff;border-radius:8px;white-space:pre-wrap;display:none;font-size:12px}
		.show-pass{background:transparent;border:none;color:var(--muted);cursor:pointer}
		@media (max-width:480px){.card{padding:18px;border-radius:10px}}
	</style>
</head>
<body>
	<main class="card" role="main">
			<div class="brand">
			<div style="display:flex;align-items:center;gap:12px">
				<div class="logo">YLG</div>
				<div>
					<h1 id="title">Sign in to your account</h1>
					<p class="lead" id="subtitle">Secure access to trading and wallet</p>
				</div>
			</div>
		</div>

		<form id="loginForm" novalidate>
			<div>
				<label for="email" id="labelEmail">Email</label>
				<input type="email" id="email" name="email" autocomplete="email" required aria-required="true" />
			</div>

			<div style="margin-top:12px">
				<label for="password" id="labelPassword">Password</label>
				<div class="row" style="margin-top:6px">
					<input type="password" id="password" name="password" autocomplete="current-password" required aria-required="true" style="flex:1;" />
					<button type="button" id="togglePass" class="show-pass" aria-label="Toggle password"> <i class="fa-solid fa-eye"></i></button>
				</div>
			</div>

			<div class="sub">
				<label style="display:flex;align-items:center;gap:8px"><input type="checkbox" id="remember" /> <span class="small">Remember me</span></label>
				<a class="link" href="forgot.html" id="forgot">Forgot password?</a>
			</div>

			<div class="actions">
				<button type="submit" id="submitBtn" class="primary">Login</button>
			</div>

			<div class="error" id="errorBox" role="alert" aria-live="assertive"></div>
			<pre class="debug" id="debugBox" aria-hidden="true"></pre>

			<p class="small" style="margin-top:14px">Don't have an account? <a class="link" href="register.html">Register</a></p>
		</form>
	</main>

	<style>
	  /* Force login to be the only visible element on the page (hides global chrome) */
	  html,body{height:100%}
	  body > main.card { position:relative; z-index:2147483647 }
	  body > :not(main.card){ display:none !important }
	</style>

	<script type="module">
        import { app, auth, db } from './firebase-init.js';
				import { signInWithEmailAndPassword, setPersistence, browserLocalPersistence } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

		// Firebase config (kept same)

		// Elements
		const form = document.getElementById('loginForm');
		const emailEl = document.getElementById('email');
		const passEl = document.getElementById('password');
		const submitBtn = document.getElementById('submitBtn');
		const errorBox = document.getElementById('errorBox');
		const debugBox = document.getElementById('debugBox');
		const togglePass = document.getElementById('togglePass');
		const remember = document.getElementById('remember');

		// Small i18n support using localStorage.selectedLang (en/mm/th)
		const texts = {
			en: { title: 'Sign in to your account', subtitle: 'Secure access to trading and wallet', email:'Email', password:'Password', remember:'Remember me', forgot:'Forgot password?', login:'Login', errorRequired:'Please fill email and password.' },
			mm: { title: 'သင့်အကောင့် ဝင်ပါ', subtitle: 'ရောင်းဝယ်မှုနှင့် ပိုက်ဆံလက်ခံရန်', email:'အီးမေးလ်', password:'စကားဝှက်', remember:'မှတ်ထားပါ', forgot:'စကားဝှက်မေ့လျှင်?', login:'လောဂ်အင်', errorRequired:'အီးမေးလ်နှင့် စကားဝှက် ထည့်ပါ။' },
			th: { title: 'เข้าสู่ระบบบัญชีของคุณ', subtitle: 'การเข้าถึงการซื้อขายและกระเป๋าอย่างปลอดภัย', email:'อีเมล', password:'รหัสผ่าน', remember:'จดจำฉัน', forgot:'ลืมรหัสผ่าน?', login:'เข้าสู่ระบบ', errorRequired:'กรุณากรอกอีเมลและรหัสผ่าน.' }
		};

		window.applyLang = function(){
			const lang = localStorage.getItem('selectedLang') || 'en';
			const t = texts[lang] || texts.en;
			document.getElementById('title').textContent = t.title;
			document.getElementById('subtitle').textContent = t.subtitle;
			document.getElementById('labelEmail').textContent = t.email;
			document.getElementById('labelPassword').textContent = t.password;
			document.querySelector('#submitBtn').textContent = t.login;
			document.querySelector('#forgot').textContent = t.forgot;
			document.querySelector('.sub label .small').textContent = t.remember;
		}
		applyLang();

		togglePass.addEventListener('click', ()=>{
			if (passEl.type === 'password'){ passEl.type = 'text'; togglePass.innerHTML = '<i class="fa-solid fa-eye-slash"></i>'; }
			else { passEl.type = 'password'; togglePass.innerHTML = '<i class="fa-solid fa-eye"></i>'; }
		});

		function setError(msg){ errorBox.style.display = msg ? 'block' : 'none'; errorBox.textContent = msg || ''; }

		form.addEventListener('submit', async (e)=>{
			e.preventDefault();
			setError('');
			debugBox.style.display = 'none';

			const email = emailEl.value.trim();
			const password = passEl.value;
			if (!email || !password){ setError(texts[localStorage.getItem('selectedLang')||'en'].errorRequired); return; }

			submitBtn.disabled = true; submitBtn.textContent = 'Checking...';

			try{
				await setPersistence(auth, browserLocalPersistence);
				const cred = await signInWithEmailAndPassword(auth, email, password);
				localStorage.setItem('userEmail', email);
				localStorage.setItem('userName', cred.user.displayName || email.split('@')[0]);
				// preserve language
				await new Promise(r=>setTimeout(r,300));
				window.location.replace('index.html');
			}catch(err){
				console.error(err);
				setError(err.message || 'Login error');
				// show debug if query ?debug=1 or localStorage.debug=true
				const showDebug = location.search.includes('debug=1') || localStorage.getItem('debug') === 'true';
				if (showDebug){ debugBox.style.display = 'block'; debugBox.textContent = `Error code: ${err.code || 'N/A'}\n${err.message || ''}`; }
				submitBtn.disabled = false; submitBtn.textContent = texts[localStorage.getItem('selectedLang')||'en'].login;
			}
		});

		// Quick keyboard nicety: Enter from any input submits
		[emailEl, passEl].forEach(el => el.addEventListener('keyup', (ev)=>{ if(ev.key==='Enter') form.requestSubmit(); }));

		// Small accessibility: clear error on input
		[emailEl, passEl].forEach(i=>i.addEventListener('input', ()=> setError('')));

	</script>

<script>
/* ═══ YLG Language Sync — v2 ═══ */
(function(){
    console.log('[YLG Sync] Initialising language sync');
    function triggerApply(lang){
        const fns = ['applyLanguage','applyChatLanguage','applyHistoryLanguage',
                     'applyKycLanguage','applyWalletLanguage','applyPortfolioLanguage',
                     'applyTradingLanguage','applyAccountLanguage','applyLang'];
        let foundAny = false;
        for (const fn of fns) {
            if (typeof window[fn] === 'function') {
                foundAny = true;
                console.log('[YLG Sync] Calling window.' + fn + '(' + lang + ')');
                try { window[fn](lang); } catch(e) { console.error('[YLG Sync]', e); }
            }
        }
        if (!foundAny) console.warn('[YLG Sync] No apply function found on window for lang=' + lang);
    }
    window.addEventListener('storage', function(e){
        if (e.key === 'selectedLang' && e.newValue) triggerApply(e.newValue);
    });
    function initialApply(){
        const lang = localStorage.getItem('selectedLang') || 'en';
        console.log('[YLG Sync] Initial apply for lang=' + lang);
        triggerApply(lang);
    }
    if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', function(){ setTimeout(initialApply, 50); });
    } else {
        setTimeout(initialApply, 50);
    }
    setTimeout(initialApply, 500);
    setTimeout(initialApply, 1500);
})();
</script>

</body>
</html>
