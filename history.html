    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css">

    <style>
        :root {
            --color-dark-bg: #111111;
            --color-medium-dark: #1A1A1A;
            --color-gold-accent: #FFD700;
            --color-text-light: #E0E0E0;
            --color-text-fade: #A0A0A0;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--color-dark-bg); color: var(--color-text-light); margin: 0; display: flex; }
        .sidebar { width: 260px; min-height: 100vh; background-color: var(--color-medium-dark); display: flex; flex-direction: column; position: fixed; z-index: 1000; border-right: 1px solid #333; }
        .logo-section { padding: 20px; border-bottom: 1px solid #3A3A3A; display: flex; align-items: center; gap: 12px; }
        .logo-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--color-gold-accent); object-fit: cover; }
        .logo-y-text { font-size: 24px; font-weight: 800; color: var(--color-gold-accent); line-height: 1; }
        .logo-subtext { font-size: 16px; font-weight: 700; color: #FFFFFF; letter-spacing: 1px; }
        .sidebar nav { display: flex; flex-direction: column; flex-grow: 1; }
        .nav-item { display: flex; align-items: center; padding: 15px 20px; color: var(--color-text-fade); text-decoration: none; transition: 0.3s; }
        .nav-item i { margin-right: 15px; width: 20px; text-align: center; }
        .nav-item:hover, .nav-item.active { background-color: #252525; color: white; border-left: 4px solid var(--color-gold-accent); }
        .side-profile { padding: 20px; border-top: 1px solid #333; display: none; }
        .main-content { margin-left: 260px; width: calc(100% - 260px); padding: 20px; box-sizing: border-box; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; }
        
        /* Table & History Card */
        .history-card { 
            background: linear-gradient(135deg, var(--color-medium-dark) 0%, #252525 100%);
            padding: 30px; 
            border-radius: 16px; 
            border: 1px solid #2a2a2a;
            margin-top: 25px; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid #333;
        }
        .history-header h3 {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            margin: 0;
            letter-spacing: 0.5px;
        }
        .stats-summary {
            display: flex;
            gap: 20px;
            font-size: 12px;
            color: var(--color-text-fade);
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background-color: rgba(255, 215, 0, 0.05);
            border-radius: 8px;
            border: 1px solid rgba(255, 215, 0, 0.1);
        }
        .stat-item i {
            color: var(--color-gold-accent);
            font-size: 14px;
        }
        .stat-value {
            font-weight: 600;
            color: #ffffff;
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
        }
        th { 
            text-align: left; 
            color: var(--color-gold-accent); 
            padding: 18px 15px; 
            border-bottom: 2px solid var(--color-gold-accent);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        td { 
            padding: 18px 15px; 
            border-bottom: 1px solid #2a2a2a; 
            font-size: 14px;
        }
        tbody tr {
            transition: all 0.3s ease;
        }
        tbody tr:hover {
            background-color: rgba(255, 215, 0, 0.05);
            border-left: 3px solid var(--color-gold-accent);
            padding-left: 12px;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 13px;
            gap: 6px;
        }
        .win {
            background-color: rgba(0, 176, 80, 0.15);
            color: #00B050;
            border: 1px solid rgba(0, 176, 80, 0.3);
        }
        .loss {
            background-color: rgba(217, 48, 37, 0.15);
            color: #FF6B6B;
            border: 1px solid rgba(217, 48, 37, 0.3);
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        .empty-state i {
            font-size: 48px;
            color: var(--color-gold-accent);
            margin-bottom: 20px;
            opacity: 0.6;
        }
        .empty-state p {
            color: var(--color-text-fade);
            font-size: 16px;
        }

        /* ГЎв‚¬вЂ“ГЎв‚¬ВЇГЎв‚¬вЂќГЎв‚¬ВєГЎв‚¬ВёГЎв‚¬в„ўГЎв‚¬ВѕГЎв‚¬В¬ ГЎв‚¬ВЎГЎв‚¬вЂўГЎв‚¬ВјГЎв‚¬Е ГЎв‚¬В·ГЎв‚¬ВєГЎв‚¬вЂўГЎв‚¬В±ГЎв‚¬В«ГЎв‚¬ВєГЎв‚¬ВЎГЎв‚¬В±ГЎв‚¬В¬ГЎв‚¬вЂћГЎв‚¬Вє ГЎв‚¬вЂўГЎв‚¬ВјГЎв‚¬вЂћГЎв‚¬ВєГЎв‚¬вЂ ГЎв‚¬вЂћГЎв‚¬ВєГЎв‚¬ВЃГЎв‚¬В»ГЎв‚¬в‚¬ГЎв‚¬Вє */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; min-height: auto; position: relative; border-right: none; }
            .sidebar nav { flex-direction: row; flex-wrap: wrap; justify-content: space-around; }
            .main-content { margin-left: 0; width: 100%; padding: 15px; }
            .nav-item { padding: 12px 10px; font-size: 12px; border-left: none !important; }
            .nav-item.active { border-bottom: 3px solid var(--color-gold-accent); }
            
            /* Table ГЎв‚¬в‚¬ГЎв‚¬В­ГЎв‚¬ВЇ Card ГЎв‚¬ВЎГЎв‚¬вЂ“ГЎв‚¬ВјГЎв‚¬вЂ¦ГЎв‚¬ВєГЎв‚¬вЂўГЎв‚¬ВјГЎв‚¬В±ГЎв‚¬В¬ГЎв‚¬вЂћГЎв‚¬ВєГЎв‚¬ВёГЎв‚¬Е“ГЎв‚¬ВІГЎв‚¬ВЃГЎв‚¬ВјГЎв‚¬вЂћГЎв‚¬ВєГЎв‚¬Вё */
            .history-card { padding: 15px; overflow-x: visible; }
            .history-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            .stats-summary {
                width: 100%;
                flex-direction: column;
                gap: 8px;
            }
            .stat-item {
                width: 100%;
                box-sizing: border-box;
            }
            thead { display: none; } /* Table ГЎв‚¬ГЎв‚¬В±ГЎв‚¬В«ГЎв‚¬вЂћГЎв‚¬ВєГЎв‚¬ВёГЎв‚¬вЂ¦ГЎв‚¬вЂ°ГЎв‚¬ВєГЎв‚¬в‚¬ГЎв‚¬В­ГЎв‚¬ВЇ ГЎв‚¬вЂ“ГЎв‚¬В»ГЎв‚¬В±ГЎв‚¬В¬ГЎв‚¬в‚¬ГЎв‚¬ВєГЎв‚¬в„ўГЎв‚¬ЕЎГЎв‚¬Вє */
            tr { 
                display: block; 
                margin-bottom: 12px; 
                border: 1px solid #333; 
                border-radius: 12px; 
                padding: 15px; 
                background: linear-gradient(135deg, #1a1a1a 0%, #222 100%);
            }
            tr:hover {
                background: linear-gradient(135deg, #252525 0%, #2a2a2a 100%);
            }
            td { 
                display: flex; 
                justify-content: space-between; 
                align-items: center;
                padding: 12px 0; 
                border-bottom: 1px solid #2a2a2a; 
                text-align: right; 
                font-size: 13px;
            }
            td:last-child { border-bottom: none; }
            
            /* ГЎв‚¬ВЃГЎв‚¬В±ГЎв‚¬В«ГЎв‚¬вЂћГЎв‚¬ВєГЎв‚¬ВёГЎв‚¬вЂ¦ГЎв‚¬вЂ°ГЎв‚¬ВєГЎв‚¬Е“ГЎв‚¬В±ГЎв‚¬ВёГЎв‚¬ВђГЎв‚¬ВЅГЎв‚¬В± ГЎв‚¬вЂўГЎв‚¬ВјГЎв‚¬вЂќГЎв‚¬ВєГЎв‚¬вЂўГЎв‚¬В±ГЎв‚¬В«ГЎв‚¬ВєГЎв‚¬ВЎГЎв‚¬В±ГЎв‚¬В¬ГЎв‚¬вЂћГЎв‚¬Вє ГЎв‚¬Е“ГЎв‚¬ВЇГЎв‚¬вЂўГЎв‚¬ВєГЎв‚¬ВЃГЎв‚¬ВјГЎв‚¬вЂћГЎв‚¬ВєГЎв‚¬Вё */
            td::before {
                content: attr(data-label);
                float: left;
                font-weight: bold;
                color: var(--color-gold-accent);
                text-transform: uppercase;
                font-size: 11px;
            }
        }
    </style>

    <main class="main-content">
        <header>
            <h2 id="page-title">Trade History</h2>
            <div id="head-user-display" style="color:var(--color-gold-accent); font-size: 13px;">Guest Mode</div>

        <div class="history-card">
            <div class="history-header">
                <h3>Trade History</h3>
                <div class="stats-summary" id="history-stats"></div>
            </div>
            <table>
                <thead>
                    <tr id="table-head">
                        <th>Date</th>

                    </tr>
                </thead>
                <tbody id="history-body">

    <script type="module">
        import { app, auth, db } from './firebase-init.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Language settings - set via localStorage
        let currentLang = localStorage.getItem('selectedLang') || 'en';
        const labels = {
            'en': ["Date", "Type", "Amount", "Status"],
            'mm': ["бЂ›бЂЂбЂєбЂ…бЂЅбЂІ", "бЂЎбЂ™бЂ»бЂ­бЂЇбЂёбЂЎбЂ…бЂ¬бЂё", "бЂ•бЂ™бЂ¬бЂЏ", "бЂЎбЂЃбЂјбЂ±бЂЎбЂ”бЂ±"],
            'th': ["Г ВёВ§Г ВёВ±Г Вёв„ўГ ВёвЂ”Г ВёВµГ В№Л†", "Г ВёвЂєГ ВёВЈГ ВёВ°Г В№в‚¬Г ВёВ Г ВёвЂ”", "Г ВёЛ†Г ВёВіГ Вёв„ўГ ВёВ§Г Вёв„ў", "Г ВёВЄГ ВёвЂ“Г ВёВІГ Вёв„ўаё°"]
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                localStorage.setItem('userShortUID', user.uid.slice(0, 8).toUpperCase());
                const fullName = localStorage.getItem('userName') || user.displayName || 'Member';
                document.getElementById('head-user-display').innerText = "Account: " + fullName;

                const q = query(collection(db, "users", user.uid, "trades"), orderBy("timestamp", "desc"));
                onSnapshot(q, (snapshot) => {
                    const tbody = document.getElementById('history-body');
                    const statsDiv = document.getElementById('history-stats');
                    tbody.innerHTML = "";
                    
                    if (snapshot.empty) {
                        tbody.innerHTML = `<tr><td colspan="4"><div class="empty-state"><i class="fas fa-inbox"></i><p>No trade history found. Start trading to see your history.</p></div></td></tr>`;
                        statsDiv.innerHTML = '';
                        return;
                    }

                    // Calculate statistics
                    let totalTrades = 0;
                    let totalWins = 0;
                    let totalLosses = 0;
                    let totalProfit = 0;

                    snapshot.forEach((doc) => {
                        const trade = doc.data();
                        totalTrades++;
                        if (trade.result === "WIN") {
                            totalWins++;
                            totalProfit += (trade.payout || 0) - (trade.amount || 0);
                        } else {
                            totalLosses++;
                            totalProfit -= (trade.amount || 0);
                        }
                    });

                    // Display statistics
                    const winRate = totalTrades > 0 ? Math.round((totalWins / totalTrades) * 100) : 0;
                    statsDiv.innerHTML = `
                        <div class="stat-item">
                            <i class="fas fa-chart-bar"></i>
                            <span>Total Trades: <span class="stat-value">${totalTrades}</span></span>
                        </div>
                        <div class="stat-item">
                            <i class="fas fa-check-circle" style="color: #00B050;"></i>
                            <span>Wins: <span class="stat-value">${totalWins}</span></span>
                        </div>
                        <div class="stat-item">
                            <i class="fas fa-times-circle" style="color: #FF6B6B;"></i>
                            <span>Losses: <span class="stat-value">${totalLosses}</span></span>
                        </div>
                        <div class="stat-item">
                            <i class="fas fa-percentage" style="color: #FFD700;"></i>
                            <span>Win Rate: <span class="stat-value" style="color: ${winRate >= 50 ? '#00B050' : '#FF6B6B'};">${winRate}%</span></span>
                        </div>
                        <div class="stat-item">
                            <i class="fas fa-coins" style="color: ${totalProfit >= 0 ? '#00B050' : '#FF6B6B'};"></i>
                            <span>P/L: <span class="stat-value" style="color: ${totalProfit >= 0 ? '#00B050' : '#FF6B6B'};">${totalProfit >= 0 ? '+' : ''}$${totalProfit.toFixed(2)}</span></span>
                        </div>
                    `;

                    snapshot.forEach((doc) => {
                        const trade = doc.data();
                        let statusHTML = "";
                        if (trade.result === "WIN") {
                            const profit = (trade.payout || 0) - (trade.amount || 0);
                            statusHTML = `<span class="status-badge win"><i class="fas fa-check-circle"></i> +$${profit.toFixed(2)}</span>`;
                        } else {
                            statusHTML = `<span class="status-badge loss"><i class="fas fa-times-circle"></i> -$${(trade.amount || 0).toFixed(2)}</span>`;
                        }

                        const row = `
                            <tr>
                                <td data-label="${labels[currentLang][0]}">${trade.date || 'N/A'}</td>
                                <td data-label="${labels[currentLang][1]}">${trade.type}</td>
                                <td data-label="${labels[currentLang][2]}">$${(trade.amount || 0).toLocaleString()}</td>
                                <td data-label="${labels[currentLang][3]}">${statusHTML}</td>
                            </tr>
                        `;
                        tbody.innerHTML += row;
                    });
                });
            } else {
                window.location.href = "login.html";
            }
        });

        window.applyHistoryLanguage = function(lang) {
            const texts = {
                'en': { nav: ["Dashboard", "Trading", "Portfolio", "History", "Wallet", "KYC", "Live Support"], title: "Trade History", table: ["Date", "Type", "Amount", "Status"] },
                'mm': { nav: ["бЂ•бЂ„бЂєбЂ™бЂ…бЂ¬бЂ™бЂ»бЂЂбЂєбЂ”бЂѕбЂ¬", "бЂ›бЂЅбЂѕбЂ±бЂ›бЂ±бЂ¬бЂ„бЂєбЂёбЂќбЂљбЂєбЂ™бЂѕбЂЇ", "бЂ•бЂ­бЂЇбЂ„бЂєбЂ†бЂ­бЂЇбЂ„бЂєбЂ™бЂѕбЂЇбЂ…бЂ¬бЂ›бЂ„бЂєбЂё", "бЂЎбЂ›бЂ±бЂ¬бЂ„бЂєбЂёбЂЎбЂќбЂљбЂєбЂ™бЂѕбЂђбЂєбЂђбЂ™бЂєбЂё", "бЂЂбЂ»бЂЅбЂ”бЂєбЂЇбЂ•бЂєбЃЏ бЂ•бЂ­бЂЇбЂЂбЂєбЂ†бЂ¶бЂЎбЂ­бЂђбЂє", "KYC бЂ…бЂ…бЂєбЂ†бЂ±бЂёбЂЃбЂјбЂ„бЂєбЂё", "бЂђбЂ­бЂЇбЂЂбЂєбЂ›бЂ­бЂЇбЂЂбЂє бЂЎбЂ‘бЂ±бЂ¬бЂЂбЂєбЂЎбЂ•бЂ¶бЂ·"], title: "бЂЂбЂЇбЂ”бЂєбЂћбЂЅбЂљбЂєбЂ™бЂѕбЂЇ бЂћбЂ™бЂ­бЂЇбЂ„бЂєбЂё", table: ["бЂ›бЂЂбЂєбЂ…бЂЅбЂІ", "бЂЎбЂ™бЂ»бЂ­бЂЇбЂёбЂЎбЂ…бЂ¬бЂё", "бЂ•бЂ™бЂ¬бЂЏ", "бЂЎбЂЃбЂјбЂ±бЂЎбЂ”бЂ±"] },
                'th': { nav: ["а№Ѓаё”аёЉаёљаё­аёЈа№Њаё”", "аёЃаёІаёЈаё‹аё·а№‰аё­аё‚аёІаёў", "аёћаё­аёЈа№Њаё•а№‚аёџаёҐаёґа№‚аё­", "аё›аёЈаё°аё§аё±аё•аёґ", "аёЃаёЈаё°а№Ђаё›а№‹аёІаёЄаё•аёІаё‡аё„а№Њ", "KYC", "аёЄаё™аё±аёљаёЄаё™аёёаё™аёЄаё”"], title: "аё›аёЈаё°аё§аё±аё•аёґаёЃаёІаёЈа№Ђаё—аёЈаё”", table: ["аё§аё±аё™аё—аёµа№€", "аё›аёЈаё°а№Ђаё аё—", "аё€аёіаё™аё§аё™", "аёЄаё–аёІаё™аё°"] }
            };
            const navItems = document.querySelectorAll('.nav-item');
            const icons = ["fa-th-large", "fa-chart-line", "fa-briefcase", "fa-history", "fa-wallet", "fa-user-check", "fa-headset"];
            navItems.forEach((item, i) => { if(item && texts[lang].nav[i]) item.innerHTML = `<i class="fas ${icons[i]}"></i> ${texts[lang].nav[i]}`; });
            document.getElementById('page-title').innerText = texts[lang].title;
            const ths = document.querySelectorAll('thead th');
            ths.forEach((th, i) => { if(th) th.innerText = texts[lang].table[i]; });
        }
        applyHistoryLanguage(currentLang);
    </script>

<script>
/* в•ђв•ђв•ђ YLG Language Sync вЂ” v2 в•ђв•ђв•ђ */
(function(){
    console.log('[YLG Sync] Initialising language sync');
    function triggerApply(lang){
        const fns = ['applyLanguage','applyChatLanguage','applyHistoryLanguage',
                     'applyKycLanguage','applyWalletLanguage','applyPortfolioLanguage',
                     'applyTradingLanguage','applyAccountLanguage','applyLang'];
        let foundAny = false;
        for (const fn of fns) {
            if (typeof window[fn] === 'function') {
                foundAny = true;
                console.log('[YLG Sync] Calling window.' + fn + '(' + lang + ')');
                try { window[fn](lang); } catch(e) { console.error('[YLG Sync]', e); }
            }
        }
        if (!foundAny) console.warn('[YLG Sync] No apply function found on window for lang=' + lang);
    }
    window.addEventListener('storage', function(e){
        if (e.key === 'selectedLang' && e.newValue) triggerApply(e.newValue);
    });
    function initialApply(){
        const lang = localStorage.getItem('selectedLang') || 'en';
        console.log('[YLG Sync] Initial apply for lang=' + lang);
        triggerApply(lang);
    }
    if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', function(){ setTimeout(initialApply, 50); });
    } else {
        setTimeout(initialApply, 50);
    }
    setTimeout(initialApply, 500);
    setTimeout(initialApply, 1500);
})();
</script>
