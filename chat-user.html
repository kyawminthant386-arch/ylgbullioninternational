<!DOCTYPE html>
<html lang="my">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YLG Bullion — Live Support</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Myanmar:wght@400;700&family=Noto+Sans+Thai:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard-styles.css">
    <link rel="stylesheet" href="mobile-responsive.css">
        <link rel="stylesheet" href="theme.css">
    <style>
        :root {
            --color-dark-bg:#0C0D0F;--color-medium-dark:#111318;--color-gold-accent:#C9A84C;
            --color-text-light:#EDF0F7;--color-text-fade:#7A8196;--color-positive:#2ECC8F;
            --color-info:#4A9EE0;--color-white:#FFFFFF;
            --gold:var(--color-gold-accent);--bg:var(--color-dark-bg);--card:var(--color-medium-dark);
            --text:var(--color-text-light);--muted:var(--color-text-fade);--green:var(--color-positive);
            --border:rgba(255,255,255,0.07);--border-gold:rgba(201,168,76,0.28);
            --gold-dim:rgba(201,168,76,0.12);--sidebar-width:240px;
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Outfit','Noto Sans Myanmar','Noto Sans Thai',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;-webkit-font-smoothing:antialiased}
        ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border-gold);border-radius:99px}
        /* SIDEBAR */
        .sidebar{width:var(--sidebar-width);min-height:100vh;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:100}
        .logo-section{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
        .logo-img{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);flex-shrink:0}
        .logo-text-group{line-height:1}
        .logo-y-text{font-size:20px;font-weight:800;color:var(--gold);display:block}
        .logo-subtext{font-size:11px;font-weight:700;color:#fff;letter-spacing:2px;display:block;margin-top:2px}
        .logo-company{font-size:9px;color:var(--muted);display:block;margin-top:3px}
        .sidebar-nav{flex-grow:1;padding:8px 10px;display:flex;flex-direction:column;gap:2px}
        .sidebar-nav .nav-item{display:flex;align-items:center;gap:11px;padding:11px 13px;color:var(--muted);text-decoration:none;border-left:3px solid transparent;border-radius:8px;transition:.18s;font-size:13px;font-weight:500}
        .sidebar-nav i{width:17px;text-align:center;font-size:13px;flex-shrink:0}
        .sidebar-nav .nav-item:hover{background:rgba(255,255,255,0.04);color:var(--text)}
        .sidebar-nav .nav-item.active{background:var(--gold-dim);color:var(--gold);border-left-color:var(--gold);font-weight:600}
        .auth-control-box{padding:14px 16px;border-top:1px solid var(--border)}
        #sidebar-logged-out a{display:block;width:100%;padding:10px;background:linear-gradient(135deg,var(--gold),#a8872e);color:#000;border-radius:8px;font-weight:700;font-size:13px;text-align:center;text-decoration:none;transition:.18s}
        #sidebar-logged-in{display:none}
        .sidebar-user-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
        #user-display-name{font-size:13px;font-weight:600;color:var(--text)}
        #sidebar-logout-btn{width:100%;padding:9px;background:rgba(224,85,85,0.1);color:#E05555;border:1px solid rgba(224,85,85,0.25);border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:.18s}
        /* MAIN */
        .main-content{margin-left:var(--sidebar-width);width:calc(100% - var(--sidebar-width));display:flex;flex-direction:column;height:100vh;overflow:hidden}
        .main-header{padding:20px 28px 16px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:12px}
        .main-header-left h2{font-size:22px;font-weight:700;color:var(--text);margin:0 0 3px;display:flex;align-items:center;gap:10px}
        .main-header-left h2 i{color:var(--gold);font-size:18px}
        .main-header-left p{font-size:12px;color:var(--muted);margin:0}
        .online-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:rgba(46,204,143,0.1);border:1px solid rgba(46,204,143,0.25);border-radius:99px;font-size:12px;font-weight:600;color:var(--green)}
        .online-dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:blink 1.5s infinite}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
        /* CHAT */
        .chat-container{flex:1;display:flex;overflow:hidden}
        .chat-window{flex:1;display:flex;flex-direction:column;overflow:hidden}
        .chat-header{display:flex;align-items:center;gap:12px;padding:13px 22px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
        .agent-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#a8872e);display:flex;align-items:center;justify-content:center;font-size:14px;color:#000;flex-shrink:0}
        .agent-info{flex:1}
        .agent-name{font-size:14px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px}
        .agent-status{font-size:11px;color:var(--green);display:flex;align-items:center;gap:4px;margin-top:1px}
        .agent-status::before{content:'';width:6px;height:6px;background:var(--green);border-radius:50%}
        .chat-messages{flex:1;padding:20px 22px;overflow-y:auto;display:flex;flex-direction:column;gap:12px;background:var(--bg)}
        .message{max-width:72%;padding:12px 16px;border-radius:14px;font-size:14px;line-height:1.5;word-break:break-word}
        .user-message{align-self:flex-end;background:linear-gradient(135deg,#1a4a7a,#1a3a5c);border:1px solid rgba(74,158,224,0.25);border-bottom-right-radius:4px;color:var(--text)}
        .admin-message{align-self:flex-start;background:#1C1F27;border:1px solid var(--border);border-bottom-left-radius:4px;color:var(--text)}
        .message-time{display:block;margin-top:6px;font-size:10px;color:rgba(255,255,255,0.35)}
        .welcome-message{align-self:flex-start;max-width:80%;padding:14px 18px;background:rgba(201,168,76,0.07);border:1px solid var(--border-gold);border-radius:14px;border-bottom-left-radius:4px;font-size:13px;line-height:1.6;color:var(--muted)}
        .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:var(--muted);text-align:center;gap:12px;padding:40px}
        .empty-state i{font-size:36px;color:var(--gold);opacity:0.5}
        .empty-state p{font-size:14px;line-height:1.6}
        .empty-state a{color:var(--gold);text-decoration:none;font-weight:600}
        /* INPUT */
        .chat-input{padding:14px 18px;background:var(--card);border-top:1px solid var(--border);display:flex;gap:10px;align-items:center;flex-shrink:0}
        .chat-input input[type="text"]{flex:1;padding:12px 16px;background:#1a1d24;border:1px solid var(--border);color:var(--text);border-radius:10px;outline:none;font-size:14px;font-family:inherit;transition:.18s}
        .chat-input input[type="text"]:focus{border-color:var(--border-gold);background:#1f2330}
        .chat-input input[type="text"]::placeholder{color:var(--muted)}
        .chat-input input[type="text"]:disabled{opacity:0.4;cursor:not-allowed}
        .img-upload-btn{width:44px;height:44px;background:#1a1d24!important;border:1px solid var(--border)!important;color:var(--muted)!important;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.18s;flex-shrink:0;font-size:15px}
        .img-upload-btn:hover{border-color:var(--border-gold)!important;color:var(--gold)!important}
        .img-upload-btn:disabled{opacity:0.35;cursor:not-allowed}
        #send-btn{padding:11px 22px;background:linear-gradient(135deg,var(--gold),#a8872e);border:none;border-radius:10px;font-weight:700;cursor:pointer;color:#000;font-size:13px;font-family:inherit;display:flex;align-items:center;gap:7px;transition:.18s;flex-shrink:0;white-space:nowrap}
        #send-btn:hover:not(:disabled){box-shadow:0 4px 16px rgba(201,168,76,0.35);transform:translateY(-1px)}
        #send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
        @media(max-width:768px){
            body{flex-direction:column}
            .sidebar{position:relative;width:100%;min-height:auto;border-right:none;border-bottom:1px solid var(--border)}
            .sidebar-nav{flex-direction:row;flex-wrap:wrap;padding:6px 8px;gap:2px}
            .sidebar-nav .nav-item{padding:8px 11px;font-size:11px;border-left:none;border-bottom:2px solid transparent}
            .sidebar-nav .nav-item.active{border-left:none;border-bottom-color:var(--gold)}
            .main-content{margin-left:0;width:100%;height:calc(100vh - 130px)}
            .chat-messages{padding:12px 14px}
            .message{max-width:88%;font-size:13px}
            .main-header{padding:14px 16px}
            .chat-input{padding:10px 12px;gap:8px}
            #send-btn{padding:11px 14px}
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo-section">
            <img src="logo.png" class="logo-img" alt="YLG" onerror="this.src='https://ui-avatars.com/api/?name=YLG&background=C9A84C&color=000&bold=true'">
            <div class="logo-text-group">
                <div class="logo-y-text">YLG</div>
                <div class="logo-subtext">BULLION</div>
                <div class="logo-company">INTERNATIONAL CO., LTD.</div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html"     class="nav-item"><i class="fas fa-th-large"></i> Dashboard</a>
            <a href="trading.html"   class="nav-item"><i class="fas fa-chart-line"></i> Gold Trading</a>
            <a href="portfolio.html" class="nav-item"><i class="fas fa-briefcase"></i> Portfolio</a>
            <a href="history.html"   class="nav-item"><i class="fas fa-history"></i> History</a>
            <a href="wallet.html"    class="nav-item"><i class="fas fa-wallet"></i> Wallet</a>
            <a href="kyc.html"       class="nav-item"><i class="fas fa-user-check"></i> KYC</a>
            <a href="chat-user.html" class="nav-item active"><i class="fas fa-headset"></i> Live Support</a>
        </nav>
        <div class="auth-control-box">
            <div id="sidebar-logged-out">
                <a href="login.html"><i class="fas fa-sign-in-alt"></i> Login / Register</a>
            </div>
            <div id="sidebar-logged-in">
                <div class="sidebar-user-row">
                    <i class="fas fa-user-circle" style="font-size:22px;color:var(--gold);flex-shrink:0"></i>
                    <span id="user-display-name">User</span>
                </div>
                <button id="sidebar-logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <header class="main-header">
            <div class="main-header-left">
                <h2><i class="fas fa-headset"></i> <span id="page-heading">Live Support Chat</span></h2>
                <p id="page-subtitle">Connect with our support team instantly • Send messages and images</p>
            </div>
            <div class="online-chip"><div class="online-dot"></div> Online</div>
        </header>
        <div class="chat-container">
            <div class="chat-window">
                <div class="chat-header">
                    <div class="agent-avatar"><i class="fas fa-user-shield"></i></div>
                    <div class="agent-info">
                        <div class="agent-name" id="chat-header-name">
                            Support Agent
                            <span style="font-size:10px;background:var(--gold-dim);color:var(--gold);padding:2px 8px;border-radius:99px;font-weight:600;">YLG</span>
                        </div>
                        <div class="agent-status">Online • Ready to help</div>
                    </div>
                </div>
                <div class="chat-messages" id="chat-messages">
                    <div class="empty-state">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Loading chat history...</p>
                    </div>
                </div>
                <div class="chat-input">
                    <input type="file" id="chat-image-input" accept="image/*" style="display:none;">
                    <button class="img-upload-btn" id="image-upload-btn" title="Upload Image" disabled><i class="fas fa-image"></i></button>
                    <input type="text" id="chat-input-field" placeholder="Type your message here..." disabled>
                    <button id="send-btn" disabled><i class="fas fa-paper-plane"></i> Send</button>
                </div>
            </div>
        </div>
    </main>

<script type="module">
    import { app, auth, db } from './firebase-init.js';
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { collection, addDoc, serverTimestamp, query, where, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    let currentUserId = null, currentUserEmail = null;

    const langTexts = {
        en: { pageTitle:'YLG Bullion - Live Support', pageHeading:'Live Support Chat', subtitle:'Connect with our support team instantly • Send messages and images', supportLabel:'Support Agent (Online)', inputPlaceholder:'Type your message here...', sendButton:'Send', loginPromptHtml:'Please <a href="login.html">login</a> to access live support chat.', welcomeLabel:'Welcome! Thanks for reaching out. Our support team is here to help. How can we assist you today?', youLabel:'You', supportLabelShort:'Support', nav:['Dashboard', 'Trading', 'Portfolio', 'History', 'Wallet', 'KYC', 'Live Support'] },
        mm: { pageTitle:'YLG Bullion - တိုက်ရိုက် အထောက်အပံ့', pageHeading:'တိုက်ရိုက် အထောက်အပံ့ စကားပြော', subtitle:'ကျွန်ုပ်တို့၏ အထောက်အပံ့အဖွဲ့နှင့် ချက်ချင်း ဆက်သွယ်ပါ • စာသားနှင့် ပုံများ ပို့နိုင်သည်', supportLabel:'အထောက်အပံ့ အေးဂျင့် (အွန်လိုင်း)', inputPlaceholder:'မက်ဆေ့ခ်ျ ထည့်ပါ...', sendButton:'ပို့မည်', loginPromptHtml:'ကျေးဇူးပြု၍ <a href="login.html">login</a> ဝင်ကာ live support chat ကို အသုံးပြုပါ။', welcomeLabel:'ကြိုဆိုပါသည်! မေးမြန်းလိုသောအရာကို ပြောပြပါ။ ကျွန်ုပ်တို့ အကူအညီပေးရန် ရှိပါသည်။', youLabel:'သင်', supportLabelShort:'အထောက်အပံ့', nav:['ပင်မစာမျက်နှာ', 'ရွှေရောင်းဝယ်မှု', 'ပိုင်ဆိုင်မှုစာရင်း', 'အရောင်းအဝယ်မှတ်တမ်း', 'ကျွန်ုပ်၏ ပိုက်ဆံအိတ်', 'KYC စစ်ဆေးခြင်း', 'တိုက်ရိုက် အထောက်အပံ့'] },
        th: { pageTitle:'YLG Bullion - ฝ่ายช่วยเหลือสด', pageHeading:'สนับสนุนสด', subtitle:'เชื่อมต่อกับทีมสนับสนุนของเราได้ทันที • ส่งข้อความและรูปภาพได้', supportLabel:'เจ้าหน้าที่สนับสนุน (ออนไลน์)', inputPlaceholder:'พิมพ์ข้อความของคุณที่นี่...', sendButton:'ส่ง', loginPromptHtml:'กรุณา <a href="login.html">เข้าสู่ระบบ</a> เพื่อเข้าถึงแชทสนับสนุนสด.', welcomeLabel:'ยินดีต้อนรับ! โปรดแจ้งสิ่งที่คุณต้องการความช่วยเหลือ ทีมเราพร้อมช่วยเหลือ.', youLabel:'คุณ', supportLabelShort:'ฝ่ายสนับสนุน', nav:['แดชบอร์ด', 'การซื้อขาย', 'พอร์ตโฟลิโอ', 'ประวัติ', 'กระเป๋าสตางค์', 'KYC', 'สนับสนุนสด'] }
    };

    window.applyChatLanguage = function(lang) {
        const texts = langTexts[lang] || langTexts.en;
        document.title = texts.pageTitle;
        const h = document.getElementById('page-heading'); if(h) h.innerText = texts.pageHeading;
        const s = document.getElementById('page-subtitle'); if(s) s.innerText = texts.subtitle;
        const n = document.getElementById('chat-header-name'); if(n) n.innerHTML = `${texts.supportLabel} <span style="font-size:10px;background:var(--gold-dim);color:var(--gold);padding:2px 8px;border-radius:99px;font-weight:600;">YLG</span>`;
        const inp = document.getElementById('chat-input-field'); if(inp) inp.placeholder = texts.inputPlaceholder;
        const btn = document.getElementById('send-btn'); if(btn) btn.innerHTML = `<i class="fas fa-paper-plane"></i> ${texts.sendButton}`;
        const msgs = document.getElementById('chat-messages');
        if(msgs && !currentUserId) msgs.innerHTML = `<div class="empty-state"><i class="fas fa-lock"></i><p>${texts.loginPromptHtml}</p></div>`;
        const navItems = document.querySelectorAll('.sidebar-nav .nav-item');
        navItems.forEach((item, idx) => { const ico = item.querySelector('i') ? item.querySelector('i').outerHTML : ''; if(texts.nav[idx]) item.innerHTML = `${ico} ${texts.nav[idx]}`; });
    }

    async function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = (e) => { const img = new Image(); img.src = e.target.result; img.onload = () => { const canvas = document.createElement('canvas'); let w=img.width,h=img.height,m=800; if(w>h&&w>m){h*=m/w;w=m;}else if(h>m){w*=m/h;h=m;} canvas.width=w;canvas.height=h; canvas.getContext('2d').drawImage(img,0,0,w,h); resolve(canvas.toDataURL('image/jpeg',0.75)); }; };
        });
    }

    document.getElementById('image-upload-btn').onclick = () => document.getElementById('chat-image-input').click();

    document.getElementById('chat-image-input').onchange = async (e) => {
        const file = e.target.files[0];
        if (file && currentUserId && currentUserEmail) {
            const btn = document.getElementById('send-btn'); btn.disabled=true; btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Uploading...';
            try { const b64 = await compressImage(file); await addDoc(collection(db,'chats'),{userId:currentUserId,userEmail:currentUserEmail,message:'[Image]',chatImageUrl:b64,isAdmin:false,timestamp:serverTimestamp()}); }
            catch(err){ console.error(err); alert('Failed to upload image.'); }
            finally { const lang=localStorage.getItem('selectedLang')||'en'; btn.disabled=false; btn.innerHTML=`<i class="fas fa-paper-plane"></i> ${langTexts[lang].sendButton}`; document.getElementById('chat-image-input').value=''; }
        } else { alert('Please login first.'); }
    };

    async function sendMessage() {
        const input = document.getElementById('chat-input-field'); const text = input.value.trim();
        if (!text || !currentUserId || !currentUserEmail) return;
        const btn = document.getElementById('send-btn'); btn.disabled=true;
        try { await addDoc(collection(db,'chats'),{userId:currentUserId,userEmail:currentUserEmail,message:text,isAdmin:false,timestamp:serverTimestamp()}); input.value=''; }
        catch(err){ console.error(err); alert('Failed to send message.'); }
        finally { const lang=localStorage.getItem('selectedLang')||'en'; btn.disabled=false; btn.innerHTML=`<i class="fas fa-paper-plane"></i> ${langTexts[lang].sendButton}`; }
    }

    function listenForMessages() {
        const msgBox = document.getElementById('chat-messages'); if(!currentUserId) return;
        const q = query(collection(db,'chats'),where('userId','==',currentUserId),orderBy('timestamp','asc'));
        onSnapshot(q, (snapshot) => {
            msgBox.innerHTML = '';
            const lang = localStorage.getItem('selectedLang')||'en'; const texts = langTexts[lang]||langTexts.en;
            const welcome = document.createElement('div'); welcome.className='message welcome-message';
            welcome.innerHTML=`<div>${texts.welcomeLabel}</div><span class="message-time">${texts.supportLabelShort}</span>`;
            msgBox.appendChild(welcome);
            snapshot.forEach((docItem) => {
                const data=docItem.data(); const div=document.createElement('div');
                const isAdmin = data.isAdmin===true||data.userEmail==='Admin';
                div.className = isAdmin ? 'message admin-message' : 'message user-message';
                const time = data.timestamp ? new Date(data.timestamp.seconds*1000).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '...';
                let content='';
                if(data.chatImageUrl){ content=`<img src="${data.chatImageUrl}" style="max-width:100%;border-radius:8px;margin-top:6px;cursor:pointer;" onclick="window.open('${data.chatImageUrl}','_blank')">`; if(data.message&&data.message!=='[Image]') content=`<div>${data.message}</div>`+content; }
                else { content=`<div>${data.message||''}</div>`; }
                div.innerHTML=content+`<span class="message-time">${isAdmin?texts.supportLabelShort:texts.youLabel} • ${time}</span>`;
                msgBox.appendChild(div);
            });
            msgBox.scrollTop=msgBox.scrollHeight;
        }, (err) => { console.error(err); document.getElementById('chat-messages').innerHTML='<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>Failed to load chat. Please refresh.</p></div>'; });
    }

    document.getElementById('send-btn').onclick = sendMessage;
    document.getElementById('chat-input-field').addEventListener('keypress',(e)=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} });

    onAuthStateChanged(auth, async (user) => {
        const lang = localStorage.getItem('selectedLang')||'en';
        if (user) {
            currentUserId=user.uid; currentUserEmail=user.email||'User';
            const name = localStorage.getItem('userName')||currentUserEmail.split('@')[0];
            document.getElementById('sidebar-logged-out').style.display='none';
            document.getElementById('sidebar-logged-in').style.display='block';
            document.getElementById('user-display-name').innerText=name;
            document.getElementById('chat-input-field').disabled=false;
            document.getElementById('send-btn').disabled=false;
            document.getElementById('image-upload-btn').disabled=false;
            applyChatLanguage(lang); listenForMessages();
        } else {
            currentUserId=null; currentUserEmail=null;
            document.getElementById('sidebar-logged-out').style.display='block';
            document.getElementById('sidebar-logged-in').style.display='none';
            document.getElementById('chat-input-field').disabled=true;
            document.getElementById('send-btn').disabled=true;
            document.getElementById('image-upload-btn').disabled=true;
            applyChatLanguage(lang);
        }
    });

    window.logout = function() { signOut(auth).then(()=>{ localStorage.removeItem('userEmail');localStorage.removeItem('userName');window.location.href='login.html'; }).catch(()=>{ window.location.href='login.html'; }); };
    window.addEventListener('DOMContentLoaded',()=>{ applyChatLanguage(localStorage.getItem('selectedLang')||'en'); });
</script>

<script>
/* ═══ YLG Language Sync — v2 ═══ */
(function(){
    console.log('[YLG Sync] Initialising language sync');
    function triggerApply(lang){
        const fns = ['applyLanguage','applyChatLanguage','applyHistoryLanguage',
                     'applyKycLanguage','applyWalletLanguage','applyPortfolioLanguage',
                     'applyTradingLanguage','applyAccountLanguage','applyLang'];
        let foundAny = false;
        for (const fn of fns) {
            if (typeof window[fn] === 'function') {
                foundAny = true;
                console.log('[YLG Sync] Calling window.' + fn + '(' + lang + ')');
                try { window[fn](lang); } catch(e) { console.error('[YLG Sync]', e); }
            }
        }
        if (!foundAny) console.warn('[YLG Sync] No apply function found on window for lang=' + lang);
    }
    window.addEventListener('storage', function(e){
        if (e.key === 'selectedLang' && e.newValue) triggerApply(e.newValue);
    });
    function initialApply(){
        const lang = localStorage.getItem('selectedLang') || 'en';
        console.log('[YLG Sync] Initial apply for lang=' + lang);
        triggerApply(lang);
    }
    if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', function(){ setTimeout(initialApply, 50); });
    } else {
        setTimeout(initialApply, 50);
    }
    setTimeout(initialApply, 500);
    setTimeout(initialApply, 1500);
})();
</script>
