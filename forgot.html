<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — YLG Bullion</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Sans+Myanmar:wght@400;700&family=Noto+Sans+Thai:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard-styles.css">
    <link rel="stylesheet" href="mobile-responsive.css">
    <link rel="stylesheet" href="theme.css">
    <style>
        /* ── Same style as login.html ── */
        :root { --bg:#0f1113; --card:#141516; --accent:#FFD700; --muted:#9aa0a6; --input:#1e1e1e; }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Noto Sans Myanmar', 'Noto Sans Thai', 'Inter', Segoe UI, Arial, system-ui, sans-serif;
            background: linear-gradient(180deg, #08090a 0%, #111214 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: var(--card);
            max-width: 420px;
            width: 100%;
            padding: 28px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,215,0,0.03);
        }

        /* Brand */
        .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }

        .logo {
            width: 52px; height: 52px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), #e6b800);
            display: flex; align-items: center; justify-content: center;
            color: #111; font-weight: 800; font-size: 20px;
            flex-shrink: 0;
        }

        .brand-text h1 { margin: 0 0 4px; font-size: 20px; }
        .brand-text p  { margin: 0; color: var(--muted); font-size: 13px; }

        /* Steps indicator */
        .steps {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 22px;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--muted);
        }

        .step-num {
            width: 22px; height: 22px;
            border-radius: 50%;
            background: #2a2a2a;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px;
            font-weight: 700;
        }

        .step.active .step-num { background: var(--accent); color: #000; }
        .step.active { color: #fff; }
        .step.done .step-num { background: #00B050; color: #fff; }

        .step-divider {
            flex: 1;
            height: 1px;
            background: #2a2a2a;
        }

        /* Form */
        label {
            display: block;
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 6px;
        }

        input[type=email] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.04);
            background: var(--input);
            color: #fff;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type=email]:focus { border-color: rgba(255,215,0,0.4); }

        button.primary {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: var(--accent);
            color: #111;
            font-weight: 700;
            cursor: pointer;
            font-size: 15px;
            font-family: inherit;
            margin-top: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s;
        }

        button.primary:disabled { opacity: 0.65; cursor: default; }
        button.primary:not(:disabled):hover { background: #e6c200; }

        .back-link {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 16px;
            font-size: 13px;
            color: var(--muted);
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover { color: #fff; }

        /* Error / info boxes */
        .msg-box {
            margin-top: 12px;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 13px;
            display: none;
            line-height: 1.5;
        }

        .msg-error   { background: #3a1b1b; color: #ffd3d3; }
        .msg-success { background: #0d2e1a; color: #7effc0; border: 1px solid rgba(0,176,80,0.3); }

        /* Success state (after email sent) */
        .success-view {
            display: none;
            text-align: center;
            padding: 10px 0;
        }

        .success-icon {
            width: 64px; height: 64px;
            background: rgba(0,176,80,0.12);
            border: 2px solid rgba(0,176,80,0.3);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px;
            color: #00B050;
            margin: 0 auto 16px;
        }

        .success-view h3 { margin: 0 0 8px; font-size: 18px; }
        .success-view p  { color: var(--muted); font-size: 13px; line-height: 1.6; margin: 0 0 20px; }

        .btn-outline {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #333;
            background: transparent;
            color: var(--muted);
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
            text-decoration: none;
            transition: 0.2s;
        }
        .btn-outline:hover { border-color: var(--accent); color: #fff; }

        /* Spinner */
        .spinner-sm {
            width: 16px; height: 16px;
            border: 2px solid rgba(0,0,0,0.3);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 480px) { .card { padding: 20px; border-radius: 10px; } }
    </style>
</head>
<body>

    <main class="card">

        <!-- Brand — same as login.html -->
        <div class="brand">
            <div class="logo">YLG</div>
            <div class="brand-text">
                <h1 id="title">Reset your password</h1>
                <p id="subtitle">We'll send a reset link to your email</p>
            </div>
        </div>

        <!-- Steps indicator -->
        <div class="steps">
            <div class="step active" id="step1">
                <div class="step-num">1</div>
                <span id="step1-label">Enter Email</span>
            </div>
            <div class="step-divider"></div>
            <div class="step" id="step2">
                <div class="step-num">2</div>
                <span id="step2-label">Check Inbox</span>
            </div>
            <div class="step-divider"></div>
            <div class="step" id="step3">
                <div class="step-num">3</div>
                <span id="step3-label">Reset Done</span>
            </div>
        </div>

        <!-- Form view -->
        <div id="form-view">
            <form id="resetForm" novalidate>
                <div>
                    <label for="email" id="label-email">Email address</label>
                    <input type="email" id="email" autocomplete="email" required
                           placeholder="your@email.com" />
                </div>

                <div class="msg-box msg-error"   id="error-box"></div>
                <div class="msg-box msg-success" id="info-box"></div>

                <button type="submit" id="submitBtn" class="primary">
                    <i class="fas fa-paper-plane"></i>
                    <span id="btn-text">Send Reset Link</span>
                </button>
            </form>

            <a href="login.html" class="back-link">
                <i class="fas fa-arrow-left"></i>
                <span id="back-text">Back to Login</span>
            </a>
        </div>

        <!-- Success view (shown after email sent) -->
        <div class="success-view" id="success-view">
            <div class="success-icon"><i class="fas fa-envelope-circle-check"></i></div>
            <h3 id="success-title">Email Sent!</h3>
            <p id="success-msg">A password reset link has been sent to <strong id="sent-to-email"></strong>.<br>Please check your inbox (and spam folder).</p>
            <a href="login.html" class="btn-outline">
                <i class="fas fa-arrow-left"></i>
                <span id="back-login-text">Back to Login</span>
            </a>
        </div>

    </main>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, sendPasswordResetEmail } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

        const firebaseConfig = {
            apiKey: 'AIzaSyBCvOnGL0ptipChgxuCtHzviZb9DZ3MAIk',
            authDomain: 'ylg-bullion-7dac6.firebaseapp.com',
            projectId: 'ylg-bullion-7dac6',
            storageBucket: 'ylg-bullion-7dac6.firebasestorage.app',
            messagingSenderId: '1076979932884',
            appId: '1:1076979932884:web:8755edb4ccac71f69b6541'
        };

        const app  = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // ── Multilingual — same pattern as login.html ──
        const texts = {
            en: {
                title:        'Reset your password',
                subtitle:     "We'll send a reset link to your email",
                labelEmail:   'Email address',
                btnText:      'Send Reset Link',
                backText:     'Back to Login',
                step1:        'Enter Email',
                step2:        'Check Inbox',
                step3:        'Reset Done',
                successTitle: 'Email Sent!',
                successMsg:   'A password reset link has been sent to',
                successMsg2:  'Please check your inbox (and spam folder).',
                backLogin:    'Back to Login',
                errEmpty:     'Please enter your email address.',
                errNotFound:  'No account found with this email.',
                errGeneral:   'Something went wrong. Please try again.',
            },
            mm: {
                title:        'စကားဝှက် ပြန်လည်သတ်မှတ်ခြင်း',
                subtitle:     'သင်၏ အီးမေးလ်သို့ Reset Link ပို့ပေးမည်',
                labelEmail:   'အီးမေးလ်လိပ်စာ',
                btnText:      'Reset Link ပို့ပါ',
                backText:     'Login သို့ ပြန်သွားပါ',
                step1:        'Email ထည့်ပါ',
                step2:        'Inbox စစ်ပါ',
                step3:        'ပြီးပါပြီ',
                successTitle: 'Email ပို့ပြီးပါပြီ!',
                successMsg:   'Password reset link ကို ဤ email သို့ ပို့ပြီးပါပြီ',
                successMsg2:  'Inbox (နှင့် spam) စစ်ဆေးပါ။',
                backLogin:    'Login သို့ ပြန်သွားပါ',
                errEmpty:     'Email လိပ်စာ ထည့်ပါ။',
                errNotFound:  'ဤ email နှင့် account မတွေ့ပါ။',
                errGeneral:   'အမှားတစ်ခုဖြစ်သွားသည်။ ထပ်ကြိုးစားပါ။',
            },
            th: {
                title:        'รีเซ็ตรหัสผ่าน',
                subtitle:     'เราจะส่งลิงก์รีเซ็ตไปยังอีเมลของคุณ',
                labelEmail:   'ที่อยู่อีเมล',
                btnText:      'ส่งลิงก์รีเซ็ต',
                backText:     'กลับไปหน้าเข้าสู่ระบบ',
                step1:        'กรอกอีเมล',
                step2:        'ตรวจกล่องจดหมาย',
                step3:        'เสร็จสิ้น',
                successTitle: 'ส่งอีเมลแล้ว!',
                successMsg:   'ลิงก์รีเซ็ตรหัสผ่านถูกส่งไปที่',
                successMsg2:  'กรุณาตรวจสอบกล่องจดหมาย (และสแปม)',
                backLogin:    'กลับไปหน้าเข้าสู่ระบบ',
                errEmpty:     'กรุณากรอกที่อยู่อีเมล',
                errNotFound:  'ไม่พบบัญชีที่ใช้อีเมลนี้',
                errGeneral:   'เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง',
            }
        };

        window.applyLang = function() {
            const lang = localStorage.getItem('selectedLang') || 'en';
            const t = texts[lang] || texts.en;
            document.getElementById('title').textContent        = t.title;
            document.getElementById('subtitle').textContent     = t.subtitle;
            document.getElementById('label-email').textContent  = t.labelEmail;
            document.getElementById('btn-text').textContent     = t.btnText;
            document.getElementById('back-text').textContent    = t.backText;
            document.getElementById('step1-label').textContent  = t.step1;
            document.getElementById('step2-label').textContent  = t.step2;
            document.getElementById('step3-label').textContent  = t.step3;
            document.getElementById('back-login-text').textContent = t.backLogin;
        }

        applyLang();

        // ── Helpers ──
        function setError(msg) {
            const box = document.getElementById('error-box');
            box.style.display = msg ? 'block' : 'none';
            box.textContent = msg || '';
        }

        function setStepActive(n) {
            [1, 2, 3].forEach(i => {
                const el = document.getElementById(`step${i}`);
                el.classList.remove('active', 'done');
                if (i < n)  el.classList.add('done');
                if (i === n) el.classList.add('active');
            });
        }

        // ── Form submit ──
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            setError('');

            const lang  = localStorage.getItem('selectedLang') || 'en';
            const t     = texts[lang] || texts.en;
            const email = document.getElementById('email').value.trim();

            if (!email) { setError(t.errEmpty); return; }

            const btn     = document.getElementById('submitBtn');
            const btnText = document.getElementById('btn-text');
            btn.disabled  = true;
            btnText.textContent = '';
            btn.innerHTML = '<div class="spinner-sm"></div>';

            try {
                await sendPasswordResetEmail(auth, email);

                // Move to step 2
                setStepActive(2);

                // Show success view
                document.getElementById('form-view').style.display    = 'none';
                document.getElementById('success-view').style.display = 'block';
                document.getElementById('sent-to-email').textContent  = email;
                document.getElementById('success-title').textContent  = t.successTitle;
                document.getElementById('success-msg').innerHTML      =
                    `${t.successMsg} <strong>${email}</strong>.<br>${t.successMsg2}`;

                // Step 3 after short delay
                setTimeout(() => setStepActive(3), 2000);

            } catch (err) {
                console.error(err);
                btn.disabled = false;
                btnText.textContent = t.btnText;
                btn.innerHTML = `<i class="fas fa-paper-plane"></i> <span id="btn-text">${t.btnText}</span>`;

                if (err.code === 'auth/user-not-found') {
                    setError(t.errNotFound);
                } else if (err.code === 'auth/invalid-email') {
                    setError(t.errEmpty);
                } else {
                    setError(t.errGeneral);
                }
            }
        });

        // Clear error on input
        document.getElementById('email').addEventListener('input', () => setError(''));
    </script>

<script>
/* ═══ YLG Language Sync — v2 ═══ */
(function(){
    console.log('[YLG Sync] Initialising language sync');
    function triggerApply(lang){
        const fns = ['applyLanguage','applyChatLanguage','applyHistoryLanguage',
                     'applyKycLanguage','applyWalletLanguage','applyPortfolioLanguage',
                     'applyTradingLanguage','applyAccountLanguage','applyLang'];
        let foundAny = false;
        for (const fn of fns) {
            if (typeof window[fn] === 'function') {
                foundAny = true;
                console.log('[YLG Sync] Calling window.' + fn + '(' + lang + ')');
                try { window[fn](lang); } catch(e) { console.error('[YLG Sync]', e); }
            }
        }
        if (!foundAny) console.warn('[YLG Sync] No apply function found on window for lang=' + lang);
    }
    window.addEventListener('storage', function(e){
        if (e.key === 'selectedLang' && e.newValue) triggerApply(e.newValue);
    });
    function initialApply(){
        const lang = localStorage.getItem('selectedLang') || 'en';
        console.log('[YLG Sync] Initial apply for lang=' + lang);
        triggerApply(lang);
    }
    if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', function(){ setTimeout(initialApply, 50); });
    } else {
        setTimeout(initialApply, 50);
    }
    setTimeout(initialApply, 500);
    setTimeout(initialApply, 1500);
})();
</script>

</body>
</html>
